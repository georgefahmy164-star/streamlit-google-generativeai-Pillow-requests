<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Joseph Fahmy AI | Infinity Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-blur: 12px; border: 1px solid rgba(59, 130, 246, 0.2); }
        #canvas-container { position: fixed; top: 0; left: 0; z-index: 0; }
        .ui-overlay { position: relative; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .logo-glow { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.8)); }
    </style>
</head>
<body class="text-white h-screen flex flex-col">

    <div id="canvas-container"></div>

    <header class="ui-overlay p-6 flex justify-between items-center glass m-4 rounded-3xl">
        <div class="flex items-center gap-4">
            <img src="logo.jpg" class="w-12 h-12 rounded-full border-2 border-blue-500 logo-glow">
            <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">JOSEPH AI INFINITY</h1>
        </div>
        <div class="flex gap-4 interactive">
            <span class="text-xs text-blue-400 font-mono uppercase tracking-widest animate-pulse">System: Active</span>
            <div class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></div>
        </div>
    </header>

    <main class="ui-overlay flex-1 flex flex-col justify-end p-6 md:p-12 overflow-hidden">
        <div id="chat-box" class="space-y-4 mb-6 overflow-y-auto max-h-[50vh] p-4 chat-container">
            </div>

        <div class="max-w-4xl mx-auto w-full glass p-2 rounded-2xl flex items-center gap-2 border-2 border-blue-500/30 interactive focus-within:border-blue-500 transition-all">
            <input id="user-input" type="text" placeholder="تحدث مع الوعي الرقمي..." class="flex-1 bg-transparent border-none p-4 outline-none text-white">
            <button onclick="send()" class="bg-blue-600 hover:bg-blue-700 p-4 rounded-xl transition shadow-lg shadow-blue-500/20">
                <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </main>

    <script>
        // --- محرك الـ 3D مع دمج الـ Logo ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // تحميل الـ Logo الخاص بك ووضعه داخل كرة الـ 3D
        const textureLoader = new THREE.TextureLoader();
        const logoTexture = textureLoader.load('logo.jpg');
        
        const geometry = new THREE.SphereGeometry(1.5, 32, 32);
        const material = new THREE.MeshPhongMaterial({
            map: logoTexture,
            shininess: 100,
            transparent: true,
            opacity: 0.9
        });
        const core = new THREE.Mesh(geometry, material);
        scene.add(core);

        // إضافة إضاءة محيطة (Ambient Light)
        const light = new THREE.PointLight(0x3b82f6, 2, 50);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 5;

        // التحريك (Animation)
        function animate() {
            requestAnimationFrame(animate);
            core.rotation.y += 0.01; // دوران اللوجو
            core.position.y = Math.sin(Date.now() * 0.002) * 0.2; // طفو النواة
            renderer.render(scene, camera);
        }
        animate();

        // منطق الإرسال (يرتبط بـ app.py الذي رفعته)
        async function send() {
            const input = document.getElementById('user-input');
            const msg = input.value;
            if(!msg) return;
            
            appendMsg('user', msg);
            input.value = '';

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `message=${msg}`
            });
            const data = await res.json();
            appendMsg('ai', data.response);
        }

        function appendMsg(role, text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl max-w-md ${role === 'user' ? 'bg-blue-600/20 mr-auto' : 'bg-purple-600/20 ml-auto border-r-4 border-purple-500'}`;
            div.innerHTML = `<p class="text-sm">${text}</p>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
